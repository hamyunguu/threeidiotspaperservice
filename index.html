<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TiPS — Three Idiots Paper Service</title>

<!-- 폰트: 디자인 원본 그대로 무료 임베드 가능한 것 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400&family=Noto+Sans+KR:wght@350;400&family=Marcellus&family=Playfair+Display:ital,wght@1,700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css">

<!-- ?v= 는 캐시 무효화용. 에셋을 바꾸면 이 숫자를 올려 브라우저가
     낡은 CSS를 재사용하지 않게 한다(Safari 캐시로 스타일이 빠지던 문제). -->
<link rel="stylesheet" href="css/reset.css?v=2">
<link rel="stylesheet" href="css/style.css?v=13">

<!-- Order 3D 프리뷰용 Three.js. importmap으로 bare specifier를 CDN에
     매핑한다. 실제 로드는 order.js가 Order 첫 진입 때 동적 import로만
     수행하므로, 다른 페이지에는 부하를 주지 않는다. -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<!--
  Figma: Web-Mobile / hero page 104:80. 1920×1080 기준.
  1rem = 10px@1920 (html font-size = 100vw/192).

  헤더(53px)는 고정. 그 아래 분할 영역 전체가 회전 무대다 —
  florisschrama.nl의 구동 방식을 모티프로: 한 점 카드 스택, 1초
  ease-in-out, 항상 앞으로(fallforward), 착지 후 리베이스.
  면은 Home / Order / Program 3면.
-->
<body class="switch-state-position-0 is-loading">

<!-- 로딩 화면 — 히어로 우측에 있던 회전 로고를 줄여서 여기로 옮겼다.
     첫 페인트부터 보이고, load 이후 app.js가 걷어낸다. -->
<div class="loader" id="loader">
  <div class="logo-square logo-spin logo-square-sm" aria-label="TiPS 로고">
    <img class="lu lu-bl" src="assets/logo-unit.png" alt="">
    <img class="lu lu-br" src="assets/logo-unit.png" alt="">
    <img class="lu lu-tr" src="assets/logo-unit.png" alt="">
    <img class="lu lu-tl" src="assets/logo-unit.png" alt="">
  </div>
  <p class="loader-label">Three Idiots Paper Service</p>
</div>

<header class="header">
  <nav class="gnb" aria-label="주 메뉴">
    <a class="gnb-item" href="#0" data-position="0">Home</a>
    <a class="gnb-item" href="#1" data-position="1">Order</a>
    <a class="gnb-item" href="#2" data-position="2">Program</a>
  </nav>

  <form class="search" role="search" onsubmit="return false">
    <label class="search-label" for="searchInput">Search</label>
    <input class="search-input" id="searchInput" type="search" autocomplete="off">
  </form>

  <div class="account">
    <button type="button">Login</button>
    <button type="button">Cart</button>
  </div>
</header>

<!-- 구분선: 면 밖에 고정. 회전과 무관하게 항상 또렷하다.
     (면 안에 두면 면이 접힐 때 함께 좁아지고, 두 면이 겹치는 순간
     두 선이 만나 흐려 보였다.) -->
<div class="rule rule-h" aria-hidden="true"></div>
<div class="rule rule-v" aria-hidden="true"></div>

<!-- 서브헤더: Order 전용. 면 밖에 고정해 회전에 끌려가지 않고,
     착지 완료 후 아래로 슬라이드하며 등장한다. -->
<div class="subheader subheader-order" aria-hidden="true">
  <nav class="subnav" aria-label="Order 메뉴">
    <button type="button" class="subnav-item is-active" data-mode="poster">Poster</button>
    <button type="button" class="subnav-item" data-mode="book">Book</button>
    <button type="button" class="subnav-item" data-mode="leaflet">Leaflet</button>
    <button type="button" class="subnav-item" data-mode="print">Print</button>
  </nav>
</div>

<div class="container-carrousel">

  <!-- 면 1 · Home (히어로 4슬라이드) -->
  <section class="bodier bodier-1" aria-label="Home">

    <div class="panel panel-left hero-left">
      <p class="hero-count"><span id="heroCount">1</span>/<span id="heroTotal">4</span></p>

      <!-- 슬라이드는 hero.js가 HERO 데이터로 채운다 -->
      <div class="hero-slides" id="heroSlides"></div>

      <button type="button" class="hero-arrow" id="heroArrow" aria-label="다음 슬라이드">
        <svg viewBox="0 0 56 40" aria-hidden="true">
          <path d="M2 20h50M36 4l16 16-16 16" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="square"/>
        </svg>
      </button>
    </div>

    <div class="panel panel-right hero-right" id="heroRight">
      <!-- 슬라이드별 이미지는 hero.js가 교차 페이드로 교체한다 -->
    </div>
  </section>

  <!-- 면 2 · Order (서브헤더는 면 밖 .subheader-order로 분리)
       좌: 옵션 구성 폼(모드별로 order.js가 채움) / 우: 실시간 3D 프리뷰 -->
  <section class="bodier bodier-2" aria-label="Order">
    <div class="panel panel-left panel-under-subnav order-options-panel">
      <form class="order-options" id="orderOptions" autocomplete="off">
        <p class="order-loading">옵션을 불러오는 중…</p>
      </form>
    </div>
    <div class="panel panel-right panel-fixed order-preview-panel">
      <div class="order-stage" id="orderStage">
        <div class="order-drop-hint" id="orderDropHint">
          <p>여기에 이미지를 끌어다 놓으면<br>바로 3D로 반영됩니다</p>
        </div>
      </div>
      <div class="order-stage-bar">
        <span class="order-dim" id="orderDim"></span>
        <button type="button" class="order-reset" id="orderResetView">시점 초기화</button>
      </div>
    </div>
  </section>

  <!-- 면 3 · Program -->
  <section class="bodier bodier-3" aria-label="Program">
    <div class="panel panel-left"></div>
    <div class="panel panel-right"></div>
  </section>

</div><!-- /.container-carrousel -->

<button type="button" class="chat">Chat</button>

<script src="js/app.js?v=3"></script>
<script src="js/hero.js?v=2"></script>
<script type="module" src="js/order.js?v=5"></script>
</body>
</html>
